name: Garmin 同步

on:
  schedule:
    - cron: '0 1 * * *' # 每天凌晨1点自动同步
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: 安装/升级依赖（核心修复）
        run: |
          python -m pip install --upgrade pip
          # 先卸载旧版本，再安装最新兼容版
          python -m pip uninstall -y garth garminconnect
          python -m pip install garth>=0.7.3 garminconnect
          # 清除旧的登录缓存
          rm -rf ~/.garminconnect
      
      - name: 运行同步脚本
        run: python sync.py # 替换成你自己的脚本文件名
        env:
          GARMIN_INTL_EMAIL: ${{ secrets.GARMIN_INTL_EMAIL }}
          GARMIN_INTL_PASSWORD: ${{ secrets.GARMIN_INTL_PASSWORD }}
          GARMIN_CN_EMAIL: ${{ secrets.GARMIN_CN_EMAIL }}
          GARMIN_CN_PASSWORD: ${{ secrets.GARMIN_CN_PASSWORD }}
        run: python sync.py

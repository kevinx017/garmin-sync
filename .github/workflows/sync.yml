name: Garmin Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 修复佳明域名解析失败（关键）
      - name: Fix Garmin DNS
        run: |
          echo "185.199.108.133 mobile.integration.garmin.com" | sudo tee -a /etc/hosts
          echo "185.199.109.133 sso.garmin.com" | sudo tee -a /etc/hosts
          echo "185.199.110.133 sso.garmin.com" | sudo tee -a /etc/hosts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 带延迟+重试，绕过IP限流（关键）
      - name: Run sync script
        run: |
          sleep 30
          python sync.py || sleep 40 && python sync.py
        env:
          GARMIN_INTL_EMAIL: ${{ secrets.GARMIN_INTL_EMAIL }}
          GARMIN_INTL_PASSWORD: ${{ secrets.GARMIN_INTL_PASSWORD }}
          GARMIN_CN_EMAIL: ${{ secrets.GARMIN_CN_EMAIL }}
          GARMIN_CN_PASSWORD: ${{ secrets.GARMIN_CN_PASSWORD }}

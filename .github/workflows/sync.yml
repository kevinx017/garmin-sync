name: Garmin Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Run sync script
        run: |
          sleep 20
          timeout 120s python sync.py || (sleep 30 && timeout 120s python sync.py)
        env:
          GARMIN_INTL_EMAIL: ${{ secrets.GARMIN_INTL_EMAIL }}
          GARMIN_INTL_PASSWORD: ${{ secrets.GARMIN_INTL_PASSWORD }}
          GARMIN_CN_EMAIL: ${{ secrets.GARMIN_CN_EMAIL }}
          GARMIN_CN_PASSWORD: ${{ secrets.GARMIN_CN_PASSWORD }}
